services:

  # MQTT BROKER
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped

    ports:
      - "1883:1883"
      - "9001:9001"

    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  # INFLUXDB
  influxdb:
    image: influxdb:2
    container_name: influxdb
    restart: unless-stopped

    ports:
      - "8086:8086"

    volumes:
      - influx_data:/var/lib/influxdb2

    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123
      DOCKER_INFLUXDB_INIT_ORG: iot
      DOCKER_INFLUXDB_INIT_BUCKET: sensors
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: mytoken

  # GRAFANA
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

    depends_on:
      - influxdb

  # BLE -> MQTT PROXY
  ble-proxy:
    build: ./ble-proxy
    container_name: ble-proxy
    restart: unless-stopped
    privileged: true

    depends_on:
      - mosquitto
    volumes:
      - /var/run/dbus:/var/run/dbus
      - /run/dbus:/run/dbus
    network_mode: host  
    environment:
      MQTT_HOST: "127.0.0.1"
      MQTT_PORT: 1883
      MQTT_TOPIC: sensors/data
      DBUS_SYSTEM_BUS_ADDRESS: unix:path=/run/dbus/system_bus_socket
      PYTHONUNBUFFERED: 1

  # MQTT -> INFLUX WRITER
  influx-writer:
    build: ./influx-writer
    container_name: influx-writer
    restart: unless-stopped

    depends_on:
      - mosquitto
      - influxdb

    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: sensors/data
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: a-ymorBdAGySnaqdgNTz1sMhOb0SKNeF9vc4ZkcsGjlNvsP-kwKLG5dpbC6On2fcmXLKtXC2XcboCSjAtsp7Fg==
      INFLUX_ORG: iot
      INFLUX_BUCKET: sensors

  # # ML / ANOMALY DETECTION
  # ml-service:
  #   build: ./ml-service
  #   container_name: ml-service
  #   restart: unless-stopped
  #   depends_on:
  #     - mosquitto
  #   environment:
  #     MQTT_HOST: mosquitto
  #     MQTT_PORT: 1883
  #     INPUT_TOPIC: sensors/data
  #     OUTPUT_TOPIC: sensors/anomaly
volumes:
  influx_data:
  grafana_data: